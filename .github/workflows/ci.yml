# ================================================================
# CI/CD — Como empresas automatizam builds e deploys
# ================================================================
# Este workflow roda automaticamente no GitHub toda vez que
# alguém faz "git push". É isso que resolve o problema de
# "instalar coisas fora do Docker": em empresas, um servidor
# na nuvem (GitHub Actions) faz o build — ele tem internet
# rápida e não sofre do problema do Docker Desktop no Windows.
# ================================================================

name: CI — Lumay Odontologia

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: lumay_test
          POSTGRES_USER: lumay_user
          POSTGRES_PASSWORD: lumay_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5
        ports: [5432:5432]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: ./backend
        run: mvn verify -B -q
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/lumay_test
          DATABASE_USERNAME: lumay_user
          DATABASE_PASSWORD: lumay_pass

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: ./frontend
        run: npm ci

      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  docker:
    name: Docker Build
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t lumay-backend:${{ github.sha }} ./backend
      - name: Build frontend image
        run: |
          cd frontend && npm ci && cd ..
          docker build -t lumay-frontend:${{ github.sha }} ./frontend
